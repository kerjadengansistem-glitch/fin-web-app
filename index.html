<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Keuangan Pribadi</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>

  <!-- Babel untuk kompilasi JSX di Browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
</head>
<body class="antialiased bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      PlusCircle, Download, Wallet, TrendingUp, TrendingDown, PiggyBank, 
      Trash2, Calendar, DollarSign, Sun, Moon, ArrowLeft, Target, Edit2, 
      ChevronDown, AlertCircle, Clock, CheckCircle2, CreditCard, Filter, 
      ClipboardList, LogOut, Eye, EyeOff, HelpCircle, X, ShieldCheck, Lock
    } from 'https://esm.sh/lucide-react@0.292.0';

    // ==========================================
    // KREDENSIAL SUPABASE ANDA
    // ==========================================
    const SUPABASE_URL = 'https://ncwtnqmwzrnpgsvjhnwv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jd3RucW13enJucGdzdmpobnd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjM4MzgsImV4cCI6MjA5MzAzOTgzOH0.tDBX2HOVcbkY4rw8yTIXAy5t_KvSjdFfU-HiDnW4mQg';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const box3D = "border-2 border-gray-900 dark:border-gray-600 shadow-[4px_4px_0_0_#111827] dark:shadow-[4px_4px_0_0_#000000] transition-all";
    const box3DHover = "hover:shadow-[6px_6px_0_0_#111827] dark:hover:shadow-[6px_6px_0_0_#000000] hover:-translate-y-0.5 transition-all";

    function AppWrapper() {
      const [supabaseClient, setSupabaseClient] = useState(null);
      const isSupabaseConfigured = SUPABASE_URL.startsWith('http://') || SUPABASE_URL.startsWith('https://');

      useEffect(() => {
        if (!isSupabaseConfigured) return;

        if (window.supabase) {
          setSupabaseClient(window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));
          return;
        }

        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js';
        script.onload = () => {
          setSupabaseClient(window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));
        };
        document.body.appendChild(script);
      }, [isSupabaseConfigured]);

      if (!isSupabaseConfigured) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
            <div className={`bg-white dark:bg-gray-800 p-8 rounded-2xl max-w-md w-full text-center ${box3D}`}>
              <AlertCircle size={48} className="text-red-500 mx-auto mb-4" />
              <h1 className="text-2xl font-black text-gray-900 dark:text-white mb-2 tracking-tight">Koneksi Database</h1>
              <p className="text-gray-500 dark:text-gray-400 font-medium mb-6">Aplikasi ini membutuhkan koneksi Supabase untuk menyimpan data.</p>
            </div>
          </div>
        );
      }

      if (!supabaseClient) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
            <div className="text-indigo-600 dark:text-indigo-400 font-bold animate-pulse text-lg">Menghubungkan ke Supabase...</div>
          </div>
        );
      }

      return <MainApp supabase={supabaseClient} />;
    }

    function MainApp({ supabase }) {
      const [session, setSession] = useState(null);
      const [authStatus, setAuthStatus] = useState('checking'); 
      const isRedirectRef = useRef(window.location.hash.includes('access_token') || window.location.search.includes('code'));

      useEffect(() => {
        let isMounted = true;

        const handleAuthChange = async (sessionUser) => {
          if (!sessionUser || !sessionUser.email) {
            if (isMounted) {
              setSession(null);
              setAuthStatus('unauthenticated');
            }
            return;
          }

          try {
            console.log("Sistem mengecek validasi email pembeli:", sessionUser.email);
            
            const { data: whitelistData, error } = await supabase
              .from('allowed_users')
              .select('email')
              .eq('email', sessionUser.email); 
            
            if (!isMounted) return;

            if (error) {
              console.error("Database menolak koneksi/error:", error.message);
              setSession(sessionUser);
              setAuthStatus('unauthorized');
              return;
            }
            
            if (whitelistData && whitelistData.length > 0) {
              console.log("Akses Diizinkan!");
              setSession(sessionUser);
              setAuthStatus('authenticated');
            } else {
              console.log("Akses Diblokir! Email belum membeli produk.");
              if (!isRedirectRef.current) {
                await supabase.auth.signOut();
                if (isMounted) {
                  setSession(null);
                  setAuthStatus('unauthenticated');
                }
              } else {
                if (isMounted) {
                  setSession(sessionUser); 
                  setAuthStatus('unauthorized');
                }
              }
            }
          } catch (error) {
            console.error("Sistem gagal memverifikasi.", error);
            if (isMounted) {
              setSession(sessionUser);
              setAuthStatus('unauthorized');
            }
          }
        };

        supabase.auth.getSession().then(({ data: { session } }) => {
          handleAuthChange(session?.user);
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          handleAuthChange(session?.user);
        });

        return () => {
          isMounted = false;
          subscription.unsubscribe();
        };
      }, [supabase]);

      const handleLogin = async () => {
        setAuthStatus('checking');
        try {
          const { error } = await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { 
              redirectTo: window.location.origin
            }
          });
          if (error) throw error;
        } catch (error) { 
          setAuthStatus('unauthenticated'); 
        }
      };

      const handleLogout = async () => {
        await supabase.auth.signOut();
        setSession(null);
        setAuthStatus('unauthenticated');
      };

      const LoginScreen = () => (
        <div className="min-h-screen flex items-center justify-center p-6 bg-gray-50 dark:bg-gray-950 transition-colors duration-300">
          <div className={`bg-white dark:bg-gray-800 p-8 rounded-3xl max-w-md w-full text-center ${box3D}`}>
            <div className="w-20 h-20 bg-indigo-100 dark:bg-indigo-900/30 rounded-2xl flex items-center justify-center mx-auto mb-6"><ShieldCheck size={40} className="text-indigo-600 dark:text-indigo-400" /></div>
            <h1 className="text-3xl font-black text-gray-900 dark:text-white mb-2">Dashboard Keuangan</h1>
            <p className="text-gray-600 dark:text-gray-400 mb-8 font-medium">Sistem manajemen finansial profesional & eksklusif.</p>
            <button onClick={handleLogin} className="w-full flex items-center justify-center gap-3 bg-white dark:bg-gray-700 border-2 border-gray-900 dark:border-gray-500 py-3.5 rounded-xl font-bold shadow-[4px_4px_0_0_#000] dark:shadow-[4px_4px_0_0_#000] active:translate-y-1 active:shadow-none transition-all dark:text-white">
              <svg className="w-5 h-5" viewBox="0 0 24 24">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              Masuk dengan Akun Terdaftar
            </button>
            <p className="mt-6 text-xs text-gray-400 font-medium italic">Proteksi Keamanan Aktif v2.0</p>
          </div>
        </div>
      );

      const UnauthorizedScreen = () => (
        <div className="min-h-screen flex items-center justify-center p-6 bg-gray-50 dark:bg-gray-950 transition-colors duration-300">
          <div className={`bg-white dark:bg-gray-800 p-8 rounded-3xl max-w-md w-full text-center ${box3D}`}>
            <div className="w-20 h-20 bg-red-100 dark:bg-red-900/30 rounded-2xl flex items-center justify-center mx-auto mb-6"><Lock size={40} className="text-red-600 dark:text-red-400" /></div>
            <h1 className="text-2xl font-black text-gray-900 dark:text-white mb-2">Akses Ditolak</h1>
            <p className="text-gray-600 dark:text-gray-400 mb-6 font-medium italic border-b-2 border-gray-100 dark:border-gray-700 pb-4">{session?.email}</p>
            <div className="bg-amber-50 dark:bg-amber-900/20 p-4 rounded-xl border-2 border-amber-200 dark:border-amber-800 text-amber-800 dark:text-amber-400 font-bold text-sm mb-6 leading-relaxed">
              Sistem mendeteksi bahwa email Anda belum terdaftar sebagai pengguna resmi produk ini. Silakan beli akses untuk mulai menggunakan aplikasi.
            </div>
            <div className="flex flex-col gap-3">
              <a href="http://lynk.id/kerjadengansistem/6edrd4yrpe3y/checkout" target="_blank" rel="noopener noreferrer" className="w-full flex items-center justify-center bg-indigo-600 text-white py-3.5 rounded-xl font-bold hover:bg-indigo-700 transition-colors border-2 border-indigo-900 shadow-[2px_2px_0_0_#312e81] active:shadow-none active:translate-y-[2px]">
                Beli Akses Sekarang
              </a>
              <button onClick={handleLogout} className="w-full bg-gray-200 text-gray-800 dark:bg-gray-700 dark:text-gray-200 py-3 rounded-xl font-bold hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                Kembali ke Halaman Login
              </button>
            </div>
          </div>
        </div>
      );

      if (authStatus === 'checking') return <div className="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900"><div className="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent"></div></div>;
      if (authStatus === 'unauthenticated') return <LoginScreen />;
      if (authStatus === 'unauthorized') return <UnauthorizedScreen />;

      return <Dashboard user={session} onLogout={handleLogout} supabase={supabase} />;
    }

    function Dashboard({ user, onLogout, supabase }) {
      const [darkMode, setDarkMode] = useState(() => localStorage.getItem('finance_theme') === 'dark');
      const [showBalance, setShowBalance] = useState(() => localStorage.getItem('finance_show_balance') !== 'false');
      const [showTutorial, setShowTutorial] = useState(false);
      const [currentView, setCurrentView] = useState('dashboard');
      const [isFetchingData, setIsFetchingData] = useState(true);
      
      const previousSaveRef = useRef(null); // Anti-Loop System

      const [transactions, setTransactions] = useState([]);
      const [goals, setGoals] = useState([]);
      const [plans, setPlans] = useState([]);
      const [wallets, setWallets] = useState([]);
      const [customCategories, setCustomCategories] = useState([]);

      const initialCategoryMap = {
        'Pemasukan': ['Gaji', 'Bonus', 'Hasil Bisnis', 'Investasi'],
        'Pengeluaran Harian': ['Makan & Minum', 'Transportasi', 'Belanja', 'Hiburan'],
        'Biaya Bulanan': ['Listrik & Air', 'Internet', 'Sewa/KPR', 'Cicilan', 'Asuransi'],
        'Tabungan': ['Dana Darurat', 'Investasi', 'Tabungan Liburan']
      };

      const navigateTo = (view) => setCurrentView(view);

      useEffect(() => {
        const loadData = async () => {
          setIsFetchingData(true);
          try {
            const { data, error } = await supabase.from('user_data').select('*').eq('user_id', user.id).single();

            if (data && !error) {
              if (data.transactions) setTransactions(data.transactions);
              if (data.wallets) setWallets(data.wallets);
              if (data.goals) setGoals(data.goals);
              if (data.plans) setPlans(data.plans);
              if (data.category_map) setCustomCategories(data.category_map);
              
              // Inisialisasi anti-loop agar tidak otomatis nge-save saat baru memuat
              previousSaveRef.current = JSON.stringify({
                transactions: data.transactions || [],
                goals: data.goals || [],
                plans: data.plans || [],
                wallets: data.wallets || [],
                category_map: data.category_map || []
              });
            }
          } catch (error) {
            console.error("Error fetching data:", error);
          } finally {
            setIsFetchingData(false);
          }
        };
        loadData();

        const channel = supabase.channel('user_data_changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'user_data', filter: `user_id=eq.${user.id}` }, (payload) => {
            const newData = payload.new;
            if (newData) {
              if (newData.transactions) setTransactions(newData.transactions);
              if (newData.wallets) setWallets(newData.wallets);
              if (newData.goals) setGoals(newData.goals);
              if (newData.plans) setPlans(newData.plans);
              if (newData.category_map) setCustomCategories(newData.category_map);
            }
          })
          .subscribe();

        return () => supabase.removeChannel(channel);
      }, [supabase, user.id]);

      // Bulletproof Auto Save
      useEffect(() => {
        if (isFetchingData) return; 
        
        const saveData = async () => {
          const dataToSave = { transactions, goals, plans, wallets, category_map: customCategories };
          const dataString = JSON.stringify(dataToSave);
          
          // Memutus rantai infinite loop
          if (previousSaveRef.current === dataString) return;
          previousSaveRef.current = dataString;

          try {
            // Mencari ID baris terlebih dahulu agar tidak bergantung pada konfigurasi 'Unique' di Supabase
            const { data: existing } = await supabase.from('user_data').select('id').eq('user_id', user.id).single();
            
            const payload = {
              user_id: user.id, 
              ...dataToSave,
              updated_at: new Date().toISOString()
            };

            if (existing && existing.id) {
              await supabase.from('user_data').update(payload).eq('id', existing.id);
            } else {
              await supabase.from('user_data').insert([payload]);
            }
          } catch (err) {
            console.error("Gagal auto-save", err);
          }
        };
        
        const timeout = setTimeout(saveData, 1500);
        return () => clearTimeout(timeout);
      }, [transactions, goals, plans, wallets, customCategories, user.id, supabase, isFetchingData]);


      const categoryMap = useMemo(() => {
        const map = { ...initialCategoryMap };
        if(Array.isArray(customCategories)) {
          customCategories.forEach(c => {
            if (!map[c.type]) map[c.type] = [];
            if (!map[c.type].includes(c.name)) map[c.type].push(c.name);
          });
        }
        return map;
      }, [customCategories]);

      const [globalFilterType, setGlobalFilterType] = useState('month'); 
      const [globalFilterValue, setGlobalFilterValue] = useState(new Date().toISOString().slice(0, 7));
      const [tableFilters, setTableFilters] = useState({ date: '', category: '', desc: '', type: '' });

      const [historyType, setHistoryType] = useState('pemasukan');
      const [historyCatFilter, setHistoryCatFilter] = useState('');
      const [historyTimeFilterType, setHistoryTimeFilterType] = useState('all');
      const [historyTimeFilterValue, setHistoryTimeFilterValue] = useState(new Date().toISOString().slice(0, 7));

      const [isSelectMode, setIsSelectMode] = useState(false);
      const [selectedIds, setSelectedIds] = useState(new Set());

      const [formData, setFormData] = useState({
        date: new Date().toISOString().split('T')[0], type: 'Pemasukan', customType: '', category: 'Gaji', customCategory: '', amount: '', description: ''
      });

      const [catDropdownOpen, setCatDropdownOpen] = useState(false);
      const [planCatDropdownOpen, setPlanCatDropdownOpen] = useState(false);
      
      const [showGoalForm, setShowGoalForm] = useState(false);
      const [goalForm, setGoalForm] = useState({ name: '', target: '', date: '', urgency: 'sedang' });
      
      const [planForm, setPlanForm] = useState({
        month: new Date().toISOString().slice(0, 7), type: 'Biaya Bulanan', customType: '', category: 'Listrik & Air', customCategory: '', amount: '', description: ''
      });

      const [showWalletForm, setShowWalletForm] = useState(false);
      const [walletForm, setWalletForm] = useState({ name: '', color: 'bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300' });

      const [modalState, setModalState] = useState({
        isOpen: false, type: 'confirm', title: '', message: '', inputValue: '', inputType: 'text', isCurrency: false, onConfirm: null,
      });

      const closeModal = () => setModalState(prev => ({ ...prev, isOpen: false, inputValue: '' }));

      useEffect(() => {
        localStorage.setItem('finance_theme', darkMode ? 'dark' : 'light');
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      useEffect(() => {
        localStorage.setItem('finance_show_balance', showBalance);
      }, [showBalance]);

      const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number || 0);
      const renderAmount = (amount) => showBalance ? formatRupiah(amount) : 'Rp •••••••';

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        if (name === 'type') {
          const isCustom = value === 'Lainnya...';
          const firstCat = isCustom ? '' : (categoryMap[value] ? categoryMap[value][0] : '');
          setFormData(prev => ({ ...prev, type: value, category: isCustom ? 'Lainnya...' : firstCat, customType: isCustom ? prev.customType : '', customCategory: isCustom ? prev.customCategory : '' }));
        } else if (name === 'amount') {
          const num = value.replace(/[^0-9]/g, '');
          setFormData(prev => ({ ...prev, amount: num ? new Intl.NumberFormat('id-ID').format(num) : '' }));
        } else {
          setFormData(prev => ({ ...prev, [name]: value }));
        }
      };

      const handleCatSelect = (cat) => { setFormData(prev => ({ ...prev, category: cat, customCategory: cat === 'Lainnya...' ? prev.customCategory : '' })); setCatDropdownOpen(false); };
      const handlePlanCatSelect = (cat) => { setPlanForm(prev => ({ ...prev, category: cat, customCategory: cat === 'Lainnya...' ? prev.customCategory : '' })); setPlanCatDropdownOpen(false); };

      const deleteCategoryFromMap = async (e, type, categoryToDelete) => {
        e.preventDefault(); e.stopPropagation(); setCatDropdownOpen(false); setPlanCatDropdownOpen(false);
        setModalState({
          isOpen: true, type: 'confirm', title: 'Hapus Kategori', message: `Hapus kategori kustom "${categoryToDelete}"? (Kategori default tidak bisa dihapus)`,
          onConfirm: async () => {
            setCustomCategories(prev => prev.filter(c => !(c.type === type && c.name === categoryToDelete)));
            if(formData.category === categoryToDelete) setFormData(prev => ({ ...prev, category: 'Lainnya...' }));
          }
        });
      };

      const filteredByGlobal = useMemo(() => {
        return transactions.filter(t => {
          if (globalFilterType === 'all') return true;
          if (globalFilterType === 'month') return t.date.startsWith(globalFilterValue);
          if (globalFilterType === 'date') return t.date === globalFilterValue;
          return true;
        });
      }, [transactions, globalFilterType, globalFilterValue]);

      const filteredForTable = useMemo(() => {
        return filteredByGlobal.filter(t => {
          return t.date.includes(tableFilters.date) &&
                 (tableFilters.category === '' || t.category === tableFilters.category) &&
                 t.description.toLowerCase().includes(tableFilters.desc.toLowerCase()) &&
                 (tableFilters.type === '' || t.type === tableFilters.type);
        });
      }, [filteredByGlobal, tableFilters]);

      const uniqueTypes = useMemo(() => [...new Set(filteredByGlobal.map(t => t.type))], [filteredByGlobal]);
      const uniqueCats = useMemo(() => [...new Set(filteredByGlobal.map(t => t.category))], [filteredByGlobal]);

      const stats = useMemo(() => {
        let totalAllPemasukan = 0; let totalAllPengeluaran = 0; let totalAllTabungan = 0;
        transactions.forEach(t => {
          if (t.type.toLowerCase().includes('pemasukan')) totalAllPemasukan += t.amount;
          else if (t.type.toLowerCase().includes('tabungan')) totalAllTabungan += t.amount;
          else totalAllPengeluaran += t.amount;
        });

        let filteredPemasukan = 0; let filteredPengeluaran = 0;
        filteredByGlobal.forEach(t => {
          if (t.type.toLowerCase().includes('pemasukan')) filteredPemasukan += t.amount;
          else if (!t.type.toLowerCase().includes('tabungan')) filteredPengeluaran += t.amount;
        });

        return {
          saldoSaatIni: totalAllPemasukan - totalAllPengeluaran - totalAllTabungan, totalTabungan: totalAllTabungan,
          pemasukanFilter: filteredPemasukan, pengeluaranFilter: filteredPengeluaran
        };
      }, [transactions, filteredByGlobal]);

      const sumOfWallets = wallets.reduce((acc, w) => acc + w.balance, 0);

      // --- CRUD TRANSACTIONS ---
      const handleSubmitTransaction = async (e) => {
        e.preventDefault();
        const parsedAmount = parseInt(formData.amount.replace(/[^0-9]/g, ''), 10);
        if (isNaN(parsedAmount) || parsedAmount <= 0) return;

        let finalType = formData.type; let finalCategory = formData.category;

        if (formData.type === 'Lainnya...' && formData.customType.trim() !== '') {
          finalType = formData.customType.trim();
        }
        if (formData.category === 'Lainnya...' && formData.customCategory.trim() !== '') {
          finalCategory = formData.customCategory.trim();
          if (!categoryMap[finalType]?.includes(finalCategory)) {
            setCustomCategories([...customCategories, { type: finalType, name: finalCategory }]);
          }
        }

        const newTx = {
          id: Date.now().toString(), date: formData.date, type: finalType, category: finalCategory,
          amount: parsedAmount, description: formData.description || '-'
        };

        setTransactions([newTx, ...transactions]);
        setFormData(prev => ({ ...prev, type: finalType, category: finalCategory, customType: '', customCategory: '', amount: '', description: '' }));
      };

      const deleteTransactionItem = (id) => {
        setModalState({
          isOpen: true, type: 'confirm', title: 'Hapus Transaksi', message: 'Hapus transaksi ini permanen?',
          onConfirm: async () => {
            setTransactions(prev => prev.filter(t => t.id !== id));
          }
        });
      };

      const deleteSelectedTransactions = () => {
        setModalState({
          isOpen: true, type: 'confirm', title: 'Hapus Multi Transaksi', message: `Hapus ${selectedIds.size} transaksi terpilih secara permanen?`,
          onConfirm: async () => {
            setTransactions(prev => prev.filter(t => !selectedIds.has(t.id)));
            setSelectedIds(new Set()); setIsSelectMode(false);
          }
        });
      };

      // --- CRUD SAVINGS ---
      const renderSavingsView = () => {
        const handleGoalSubmit = async (e) => {
          e.preventDefault();
          const target = parseInt(goalForm.target.replace(/[^0-9]/g, ''), 10);
          if (!goalForm.name || isNaN(target) || target <= 0) return;
          
          const newGoal = { id: Date.now().toString(), name: goalForm.name, target, saved: 0, date: goalForm.date || null, urgency: goalForm.urgency };
          setGoals([...goals, newGoal]);
          setShowGoalForm(false); setGoalForm({ name: '', target: '', date: '', urgency: 'sedang' });
        };

        const updateGoalSaved = (id, currentSaved) => {
          setModalState({
            isOpen: true, type: 'prompt', inputType: 'text', isCurrency: true, title: 'Update Saldo Target',
            message: "Masukkan nominal yang ditambahkan (ketik '-' di awal untuk mengurangi):", inputValue: '',
            onConfirm: async (val) => {
              const isNegative = val.startsWith('-');
              let amount = parseInt(val.replace(/[^0-9]/g, ''), 10);
              if (isNaN(amount)) return setTimeout(() => setModalState({ isOpen: true, type: 'alert', title: 'Error', message: 'Nominal tidak valid!' }), 300);
              if (isNegative) amount = -amount;
              
              const newSaved = Math.max(0, currentSaved + amount);
              setGoals(goals.map(g => g.id === id ? { ...g, saved: newSaved } : g));
            }
          });
        };

        const deleteGoal = (id) => {
          setModalState({
            isOpen: true, type: 'confirm', title: 'Hapus Target', message: 'Hapus target tabungan ini?', 
            onConfirm: async () => {
              setGoals(goals.filter(g => g.id !== id));
            }
          });
        }

        return (
          <div className="space-y-4 sm:space-y-6 animate-fadeIn">
            <div className="flex items-center gap-3 sm:gap-4">
              <button onClick={() => navigateTo('dashboard')} className={`p-2 bg-gray-200 dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-700 rounded-full ${box3D}`}><ArrowLeft size={18} className="sm:w-5 sm:h-5" /></button>
              <h2 className="text-xl sm:text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-2"><Target className="text-purple-500 w-5 h-5 sm:w-6 sm:h-6" /> Target Tabungan</h2>
            </div>
            <div className={`bg-purple-100 dark:bg-purple-900/30 p-4 sm:p-6 rounded-2xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4 ${box3D}`}>
              <div className="w-full md:w-auto">
                <p className="text-purple-800 dark:text-purple-300 font-bold text-sm sm:text-base">Total Seluruh Tabungan</p>
                <h3 className="text-2xl sm:text-3xl font-black text-purple-900 dark:text-purple-100 mt-1 tracking-tighter truncate">{renderAmount(stats.totalTabungan)}</h3>
              </div>
              <button onClick={() => setShowGoalForm(!showGoalForm)} className={`w-full md:w-auto bg-purple-600 hover:bg-purple-700 text-white px-5 py-3 sm:py-2.5 rounded-lg font-bold ${box3DHover}`}>{showGoalForm ? "Batal" : "+ Buat Target Baru"}</button>
            </div>

            {showGoalForm && (
              <form onSubmit={handleGoalSubmit} className={`bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-2xl grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 ${box3D}`}>
                <div><label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Nama Target</label><input type="text" required value={goalForm.name} onChange={e => setGoalForm({...goalForm, name: e.target.value})} placeholder="Misal: Beli Laptop" className="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg p-2.5 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none focus:border-gray-900 dark:focus:border-white transition-colors" /></div>
                <div><label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Target Nominal (Rp)</label><input type="text" inputMode="numeric" required value={goalForm.target} onChange={e => { const num = e.target.value.replace(/[^0-9]/g, ''); setGoalForm({...goalForm, target: num ? new Intl.NumberFormat('id-ID').format(num) : ''}); }} placeholder="0" className="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg p-2.5 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none focus:border-gray-900 dark:focus:border-white transition-colors" /></div>
                <div><label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Tercapai Pada</label><input type="date" value={goalForm.date} onChange={e => setGoalForm({...goalForm, date: e.target.value})} className="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg p-2.5 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none focus:border-gray-900 dark:focus:border-white transition-colors" /></div>
                <div>
                  <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Urgensi</label>
                  <select value={goalForm.urgency} onChange={e => setGoalForm({...goalForm, urgency: e.target.value})} className="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg p-2.5 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none focus:border-gray-900 dark:focus:border-white transition-colors">
                    <option value="rendah">Rendah (Santai)</option><option value="sedang">Sedang (Normal)</option><option value="tinggi">Tinggi (Penting)</option>
                  </select>
                </div>
                <div className="md:col-span-2 lg:col-span-4 flex justify-end mt-2"><button type="submit" className="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 sm:py-2.5 rounded-lg font-bold transition-colors">Simpan Target</button></div>
              </form>
            )}

            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
              {goals.map(goal => {
                const progress = Math.min(100, (goal.saved / goal.target) * 100);
                let UrgencyIcon = CheckCircle2; let iconColor = "text-green-500";
                if (goal.urgency === 'sedang') { UrgencyIcon = Clock; iconColor = "text-yellow-500"; }
                if (goal.urgency === 'tinggi') { UrgencyIcon = AlertCircle; iconColor = "text-red-500"; }

                return (
                  <div key={goal.id} className={`bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-2xl relative flex flex-col ${box3D}`}>
                    <button onClick={() => deleteGoal(goal.id)} className="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition-colors"><Trash2 size={18} /></button>
                    <div className="flex items-center gap-2 mb-4"><UrgencyIcon size={20} className={iconColor} /><h3 className="text-lg sm:text-xl font-bold text-gray-800 dark:text-gray-100 pr-6 break-words whitespace-normal leading-tight">{goal.name}</h3></div>
                    {goal.date && <p className="text-xs sm:text-sm font-medium text-gray-500 dark:text-gray-400 mb-4 flex items-center gap-1.5"><Calendar size={14}/> Target: {goal.date}</p>}
                    <div className="mt-auto">
                      <div className="flex justify-between text-xs sm:text-sm mb-1 font-bold"><span className="text-gray-500 dark:text-gray-400">Terkumpul</span><span className="text-gray-800 dark:text-gray-200">{renderAmount(goal.saved)}</span></div>
                      <div className="flex justify-between text-xs sm:text-sm mb-4 font-bold"><span className="text-gray-500 dark:text-gray-400">Target</span><span className="text-gray-800 dark:text-gray-200">{renderAmount(goal.target)}</span></div>
                      <div className="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-3 sm:h-4 mb-2 overflow-hidden border border-gray-300 dark:border-gray-600"><div className="bg-gradient-to-r from-purple-500 to-indigo-500 h-full rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div></div>
                      <p className="text-xs sm:text-sm text-right text-purple-600 dark:text-purple-400 font-black mb-4 sm:mb-5">{progress.toFixed(1)}%</p>
                      <button onClick={() => updateGoalSaved(goal.id, goal.saved)} className="w-full flex items-center justify-center gap-2 bg-purple-50 dark:bg-purple-900/20 border-2 border-purple-500 text-purple-600 dark:text-purple-400 hover:bg-purple-100 dark:hover:bg-purple-900/40 py-2.5 rounded-lg font-bold transition-colors text-sm"><Edit2 size={16} /> Update Saldo</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      const renderWalletsView = () => {
        const WalletColors = [
          { id: 'bca', class: 'bg-blue-100 text-blue-700 border-blue-300 dark:bg-blue-900/50 dark:text-blue-300 dark:border-blue-700' }, 
          { id: 'mandiri', class: 'bg-yellow-100 text-yellow-700 border-yellow-300 dark:bg-yellow-900/50 dark:text-yellow-300 dark:border-yellow-700' }, 
          { id: 'gopay', class: 'bg-sky-100 text-sky-700 border-sky-300 dark:bg-sky-900/50 dark:text-sky-300 dark:border-sky-700' }, 
          { id: 'ovo', class: 'bg-purple-100 text-purple-700 border-purple-300 dark:bg-purple-900/50 dark:text-purple-300 dark:border-purple-700' }, 
          { id: 'dana', class: 'bg-indigo-100 text-indigo-700 border-indigo-300 dark:bg-indigo-900/50 dark:text-indigo-300 dark:border-indigo-700' }, 
          { id: 'linkaja', class: 'bg-red-100 text-red-700 border-red-300 dark:bg-red-900/50 dark:text-red-300 dark:border-red-700' }, 
          { id: 'shopee', class: 'bg-orange-100 text-orange-700 border-orange-300 dark:bg-orange-900/50 dark:text-orange-300 dark:border-orange-700' }, 
          { id: 'jago', class: 'bg-orange-50 text-orange-600 border-orange-200 dark:bg-orange-900/30 dark:text-orange-400 dark:border-orange-800' }, 
          { id: 'bri', class: 'bg-blue-50 text-blue-800 border-blue-200 dark:bg-blue-950 dark:text-blue-400 dark:border-blue-800' }, 
          { id: 'bni', class: 'bg-teal-100 text-teal-800 border-teal-300 dark:bg-teal-900/50 dark:text-teal-300 dark:border-teal-700' }, 
          { id: 'cash', class: 'bg-green-100 text-green-700 border-green-300 dark:bg-green-900/50 dark:text-green-300 dark:border-green-700' }, 
          { id: 'gray', class: 'bg-gray-100 text-gray-700 border-gray-300 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600' }, 
          { id: 'pink', class: 'bg-pink-100 text-pink-700 border-pink-300 dark:bg-pink-900/50 dark:text-pink-300 dark:border-pink-700' },
          { id: 'rose', class: 'bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/50 dark:text-rose-300 dark:border-rose-700' }
        ];

        const submitWallet = async (e) => {
          e.preventDefault(); if (!walletForm.name) return;
          const newWallet = { id: Date.now().toString(), name: walletForm.name, balance: 0, color: walletForm.color };
          
          setWallets([...wallets, newWallet]);
          setShowWalletForm(false); setWalletForm({ name: '', color: WalletColors[0].class });
        };

        const updateWalletBalance = (id) => {
          setModalState({
            isOpen: true, type: 'prompt', inputType: 'text', isCurrency: true, title: 'Sesuaikan Saldo',
            message: "Masukkan nominal saldo terbaru:", inputValue: '',
            onConfirm: async (val) => {
              const balance = parseInt(val.replace(/[^0-9]/g, ''), 10);
              if (!isNaN(balance)) {
                setWallets(wallets.map(w => w.id === id ? { ...w, balance } : w));
              } else setTimeout(() => setModalState({ isOpen: true, type: 'alert', title: 'Error', message: 'Nominal tidak valid!' }), 300);
            }
          });
        };

        return (
          <div className="space-y-4 sm:space-y-6 animate-fadeIn">
            <div className="flex items-center gap-3 sm:gap-4">
              <button onClick={() => navigateTo('dashboard')} className={`p-2 bg-gray-200 dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-700 rounded-full ${box3D}`}>
                <ArrowLeft size={18} className="sm:w-5 sm:h-5" />
              </button>
              <h2 className="text-xl sm:text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-2"><CreditCard className="text-blue-500 w-5 h-5 sm:w-6 sm:h-6" /> Dompet & Rekening</h2>
            </div>

            <div className={`bg-blue-100 dark:bg-blue-900/30 p-4 sm:p-6 rounded-2xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4 ${box3D}`}>
              <div className="w-full md:w-auto">
                <p className="text-blue-800 dark:text-blue-300 font-bold text-sm sm:text-base">Saldo Sistem (Kalkulasi Transaksi)</p>
                <h3 className="text-2xl sm:text-3xl font-black text-blue-900 dark:text-blue-100 mt-1 tracking-tighter truncate">{renderAmount(stats.saldoSaatIni)}</h3>
                {sumOfWallets !== stats.saldoSaatIni && (
                  <p className="text-xs sm:text-sm font-medium text-blue-700 dark:text-blue-400 mt-2 flex items-start sm:items-center gap-1.5 bg-blue-200 dark:bg-blue-800/50 px-3 py-1.5 rounded-lg break-words w-full">
                    <AlertCircle size={14} className="shrink-0 mt-0.5 sm:mt-0"/> <span>Selisih {renderAmount(Math.abs(stats.saldoSaatIni - sumOfWallets))} antara Sistem dan Total Dompet.</span>
                  </p>
                )}
              </div>
              <button onClick={() => setShowWalletForm(!showWalletForm)} className={`w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 sm:py-2.5 rounded-lg font-bold ${box3DHover}`}>
                {showWalletForm ? 'Batal' : '+ Tambah Dompet'}
              </button>
            </div>

            {showWalletForm && (
              <form onSubmit={submitWallet} className={`bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-2xl flex flex-col lg:flex-row gap-4 sm:gap-6 items-start lg:items-end ${box3D}`}>
                <div className="flex-1 w-full">
                  <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">Nama Dompet</label>
                  <input type="text" required value={walletForm.name} onChange={e => setWalletForm({...walletForm, name: e.target.value})} className="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg p-2.5 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none focus:border-gray-900 dark:focus:border-white transition-colors" />
                </div>
                <div className="w-full lg:w-3/5">
                  <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">Pilih Warna</label>
                  <div className="flex flex-wrap gap-2 items-center">
                    {WalletColors.map(c => (
                      <div 
                        key={c.id} onClick={() => setWalletForm({...walletForm, color: c.class})} 
                        className={`w-7 h-7 sm:w-8 sm:h-8 rounded-full cursor-pointer transition-transform hover:scale-110 ${c.class.split(' ').slice(0,2).join(' ')} ${walletForm.color === c.class ? 'ring-2 ring-offset-2 ring-gray-800 dark:ring-white scale-110 shadow-md' : 'border border-black/10 dark:border-white/20'}`} 
                      />
                    ))}
                  </div>
                </div>
                <button type="submit" className="w-full lg:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 sm:py-2.5 rounded-lg font-bold transition-colors mt-2 sm:mt-0">Simpan</button>
              </form>
            )}

            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
              {wallets.map(wallet => (
                <div key={wallet.id} className={`bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-2xl relative ${box3D}`}>
                  <button onClick={() => setModalState({ isOpen: true, type: 'confirm', title: 'Hapus Dompet', message: 'Hapus dompet ini?', onConfirm: async () => { 
                    setWallets(wallets.filter(w => w.id !== wallet.id)); 
                  } })} className="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition-colors"><Trash2 size={18} /></button>
                  <div className={`p-2.5 sm:p-3 rounded-xl inline-block mb-3 sm:mb-4 shadow-sm ${wallet.color}`}><Wallet size={20} className="sm:w-6 sm:h-6" /></div>
                  <h3 className="text-lg sm:text-xl font-bold text-gray-800 dark:text-gray-100 pr-6 break-words leading-tight">{wallet.name}</h3>
                  <p className="text-xl sm:text-2xl font-black text-gray-800 dark:text-gray-200 my-1.5 sm:my-2 tracking-tighter truncate">{renderAmount(wallet.balance)}</p>
                  <button onClick={() => updateWalletBalance(wallet.id)} className="w-full flex items-center justify-center gap-2 mt-4 sm:mt-5 border-2 border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 py-2.5 rounded-lg font-bold transition-colors text-sm"><Edit2 size={16} /> Sesuaikan Saldo</button>
                </div>
              ))}
            </div>
          </div>
        );
      };

      const renderHistoryView = () => {
        const isIncomeView = historyType === 'pemasukan';
        const IconComponent = isIncomeView ? TrendingUp : TrendingDown;
        const title = isIncomeView ? 'Riwayat Pemasukan' : 'Riwayat Pengeluaran';
        const iconColorClass = isIncomeView ? 'text-green-500' : 'text-red-500';
        const headerBgClass = isIncomeView ? 'bg-green-100 dark:bg-green-900/30 border-green-200 dark:border-green-800' : 'bg-red-100 dark:bg-red-900/30 border-red-200 dark:border-red-800';
        const textColorClass = isIncomeView ? 'text-green-800 dark:text-green-300' : 'text-red-800 dark:text-red-300';
        const amountColorClass = isIncomeView ? 'text-green-900 dark:text-green-100' : 'text-red-900 dark:text-red-100';

        const filteredHistory = transactions.filter(t => {
          const isIncome = t.type.toLowerCase().includes('pemasukan');
          const isSaving = t.type.toLowerCase().includes('tabungan');
          const isExpense = !isIncome && !isSaving;
          const typeMatch = isIncomeView ? isIncome : isExpense;
          const catMatch = historyCatFilter === '' || t.category === historyCatFilter;
          let timeMatch = true;
          if (historyTimeFilterType === 'month') timeMatch = t.date.startsWith(historyTimeFilterValue);
          else if (historyTimeFilterType === 'date') timeMatch = t.date === historyTimeFilterValue;
          return typeMatch && catMatch && timeMatch;
        });

        const uniqueHistoryCats = [...new Set(transactions.filter(t => {
          const isIncome = t.type.toLowerCase().includes('pemasukan');
          const isSaving = t.type.toLowerCase().includes('tabungan');
          return isIncomeView ? isIncome : (!isIncome && !isSaving);
        }).map(t => t.category))];

        const totalNominal = filteredHistory.reduce((acc, curr) => acc + curr.amount, 0);

        return (
          <div className="space-y-4 sm:space-y-6 animate-fadeIn">
            <div className="flex items-center gap-3 sm:gap-4">
              <button onClick={() => { navigateTo('dashboard'); setHistoryCatFilter(''); setHistoryTimeFilterType('all'); }} className={`p-2 bg-gray-200 dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-700 rounded-full ${box3D}`}><ArrowLeft size={18} className="sm:w-5 sm:h-5" /></button>
              <h2 className="text-xl sm:text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-2"><IconComponent className={`${iconColorClass} w-5 h-5 sm:w-6 sm:h-6`} /> {title}</h2>
            </div>

            <div className={`${headerBgClass} p-4 sm:p-6 rounded-2xl flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 ${box3D}`}>
              <div className="w-full lg:w-auto">
                <p className={`${textColorClass} font-bold text-sm sm:text-base`}>Total {historyTimeFilterType === 'all' ? '(Semua Waktu)' : historyTimeFilterType === 'month' ? '(Bulan Ini)' : '(Harian)'}</p>
                <h3 className={`text-2xl sm:text-3xl font-black ${amountColorClass} mt-1 tracking-tighter truncate`}>{renderAmount(totalNominal)}</h3>
              </div>
              <div className="flex flex-col sm:flex-row w-full lg:w-auto gap-3">
                 <div className="flex flex-1 sm:flex-none items-center gap-2 bg-white dark:bg-gray-800 border-2 border-gray-900 dark:border-gray-500 rounded-lg p-2.5 sm:p-2 shadow-sm">
                   <Calendar size={18} className="text-gray-500 ml-1 shrink-0" />
                   <select value={historyTimeFilterType} onChange={(e) => setHistoryTimeFilterType(e.target.value)} className="bg-transparent font-bold text-gray-800 dark:text-gray-200 text-sm outline-none cursor-pointer pr-1">
                     <option value="all">Semua Waktu</option><option value="month">Bulanan</option><option value="date">Harian</option>
                   </select>
                   {historyTimeFilterType === 'month' && <input type="month" value={historyTimeFilterValue} onChange={(e) => setHistoryTimeFilterValue(e.target.value)} className="bg-transparent font-bold text-gray-800 dark:text-gray-200 text-sm outline-none w-full sm:w-auto border-l-2 border-gray-200 dark:border-gray-600 pl-2 ml-1" />}
                   {historyTimeFilterType === 'date' && <input type="date" value={historyTimeFilterValue} onChange={(e) => setHistoryTimeFilterValue(e.target.value)} className="bg-transparent font-bold text-gray-800 dark:text-gray-200 text-sm outline-none w-full sm:w-auto border-l-2 border-gray-200 dark:border-gray-600 pl-2 ml-1" />}
                 </div>
                 <div className="flex flex-1 sm:flex-none items-center gap-2 bg-white dark:bg-gray-800 border-2 border-gray-900 dark:border-gray-500 rounded-lg p-2.5 sm:p-2 shadow-sm">
                   <Filter size={18} className="text-gray-500 ml-1 shrink-0" />
                   <select value={historyCatFilter} onChange={(e) => setHistoryCatFilter(e.target.value)} className="bg-transparent font-bold text-gray-800 dark:text-gray-200 text-sm outline-none w-full cursor-pointer pr-2">
                     <option value="">Semua Kategori</option>{uniqueHistoryCats.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                   </select>
                 </div>
              </div>
            </div>

            <div className={`bg-white dark:bg-gray-800 rounded-2xl flex flex-col overflow-hidden ${box3D}`}>
              <div className="w-full overflow-x-auto bg-gray-50 dark:bg-gray-900/50">
                <table className="w-full text-left border-collapse min-w-[700px]">
                  <thead className="bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-sm border-b-2 border-gray-200 dark:border-gray-700">
                    <tr>
                      <th className="p-3 sm:p-4 font-bold whitespace-nowrap w-24 sm:w-32">Tanggal</th>
                      <th className="p-3 sm:p-4 font-bold">Kategori</th>
                      <th className="p-3 sm:p-4 font-bold">Keterangan</th>
                      <th className="p-3 sm:p-4 font-bold text-right">Nominal</th>
                      <th className="p-3 sm:p-4 font-bold text-center w-16 sm:w-20">Aksi</th>
                    </tr>
                  </thead>
                  <tbody className="text-sm">
                    {filteredHistory.length === 0 ? (
                      <tr>
                        <td colSpan="5" className="text-center text-gray-500 py-12 sm:py-16 bg-white dark:bg-gray-800">
                          <IconComponent size={40} className="mx-auto mb-3 opacity-20 sm:w-12 sm:h-12" />
                          <p className="font-bold">Tidak ada data untuk ditampilkan.</p>
                        </td>
                      </tr>
                    ) : (
                      filteredHistory.map((t) => (
                        <tr key={t.id} className="border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                          <td className="p-3 sm:p-4 text-gray-700 dark:text-gray-300 font-medium whitespace-nowrap">{t.date}</td>
                          <td className="p-3 sm:p-4 text-gray-900 dark:text-gray-100 font-bold">{t.category}</td>
                          <td className="p-3 sm:p-4 text-gray-600 dark:text-gray-400 font-medium max-w-[150px] sm:max-w-none truncate sm:whitespace-normal">{t.description}</td>
                          <td className={`p-3 sm:p-4 text-right font-black tracking-tight text-sm sm:text-base whitespace-nowrap ${isIncomeView ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'}`}>{isIncomeView ? '+' : '-'}{renderAmount(t.amount)}</td>
                          <td className="p-3 sm:p-4 text-center">
                            <button onClick={() => deleteTransactionItem(t.id)} className="text-gray-400 hover:text-white hover:bg-red-500 p-1.5 sm:p-2 rounded-lg transition-all" title="Hapus"><Trash2 size={16} className="sm:w-[18px] sm:h-[18px]" /></button>
                          </td>
                        </tr>
                      ))
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      };

      const renderPlannerView = () => {
        // Hanya memunculkan Pengeluaran di Form Rencana
        const plannerAllowedTypes = ['Biaya Bulanan', 'Pengeluaran Harian'];

        const handlePlanSubmit = async (e) => {
          e.preventDefault();
          const parsedAmount = parseInt(planForm.amount.replace(/[^0-9]/g, ''), 10);
          if (isNaN(parsedAmount) || parsedAmount <= 0) return;

          let finalType = planForm.type; let finalCategory = planForm.category;
          if (planForm.type === 'Lainnya...' && planForm.customType.trim() !== '') finalType = planForm.customType.trim();
          if (planForm.category === 'Lainnya...' && planForm.customCategory.trim() !== '') finalCategory = planForm.customCategory.trim();

          const newPlan = { id: Date.now().toString(), month: planForm.month, type: finalType, category: finalCategory, amount: parsedAmount, description: planForm.description || '-', is_completed: false };
          
          setPlans([newPlan, ...plans]);
          setPlanForm(prev => ({ ...prev, type: finalType, category: finalCategory, customType: '', customCategory: '', amount: '', description: '' }));
        };

        const executePlan = (plan) => {
          setModalState({
            isOpen: true, type: 'prompt', inputType: 'text', isCurrency: true, title: 'Eksekusi Rencana', 
            message: `Catat "${plan.category}" ke riwayat hari ini. Edit nominal jika aktualnya berbeda:`,
            inputValue: new Intl.NumberFormat('id-ID').format(plan.amount),
            onConfirm: async (val) => {
              const actualAmount = parseInt(val.replace(/[^0-9]/g, ''), 10);
              if (isNaN(actualAmount) || actualAmount <= 0) return setTimeout(() => setModalState({ isOpen: true, type: 'alert', title: 'Error', message: 'Nominal tidak valid!' }), 300);
              
              setPlans(prev => prev.map(p => p.id === plan.id ? { ...p, is_completed: true } : p));
              
              const newTx = { id: Date.now().toString(), date: new Date().toISOString().split('T')[0], type: plan.type, category: plan.category, amount: actualAmount, description: `[Rencana] ${plan.description}` };
              setTransactions(prev => [newTx, ...prev]);
            }
          });
        };

        const deletePlan = (id) => {
          setModalState({
            isOpen: true, type: 'confirm', title: 'Hapus Rencana', message: 'Hapus rencana ini dari daftar?',
            onConfirm: async () => {
              setPlans(prev => prev.filter(p => p.id !== id));
            }
          });
        };

        const currentMonthPlans = plans.filter(p => p.month === planForm.month);
        const totalPlannedAmount = currentMonthPlans.reduce((acc, curr) => acc + curr.amount, 0);

        return (
          <div className="space-y-4 sm:space-y-6 animate-fadeIn">
            <div className="flex items-center gap-3 sm:gap-4">
              <button onClick={() => navigateTo('dashboard')} className={`p-2 bg-gray-200 dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-700 rounded-full ${box3D}`}><ArrowLeft size={18} className="sm:w-5 sm:h-5" /></button>
              <h2 className="text-xl sm:text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-2"><ClipboardList className="text-amber-500 w-5 h-5 sm:w-6 sm:h-6" /> Rencana Bulanan</h2>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-5 sm:gap-6 items-start">
              <div className={`lg:col-span-4 bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-2xl flex flex-col ${box3D}`}>
                <h2 className="text-lg sm:text-xl font-black text-gray-900 dark:text-white mb-4 sm:mb-5">Buat Rencana</h2>
                <form onSubmit={handlePlanSubmit} className="space-y-3 sm:space-y-4">
                  <div><label className="block text-xs sm:text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Bulan Rencana</label><input type="month" required value={planForm.month} onChange={e => setPlanForm({...planForm, month: e.target.value})} className="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg p-2.5 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white font-medium outline-none focus:border-gray-900 dark:focus:border-white transition-colors" /></div>
                  <div>
                    <label className="block text-xs sm:text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Jenis Transaksi</label>
                    <select value={planForm.type} onChange={e => { const val = e.target.value; const isCustom = val === 'Lainnya...'; setPlanForm({...planForm, type: val, category: isCustom ? 'Lainnya...' : (categoryMap[val] ? categoryMap[val][0] : ''), customType: isCustom ? planForm.customType : '', customCategory: isCustom ? planForm.customCategory : ''}); }} className="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg p-2.5 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white font-medium outline-none focus:border-gray-900 transition-colors cursor-pointer">
                      {Object.keys(categoryMap).filter(type => plannerAllowedTypes.includes(type)).map(type => <option key={type} value={type}>{type}</option>)}
                      <option value="Lainnya...">Lainnya...</option>
                    </select>
                    {planForm.type === 'Lainnya...' && <input type="text" placeholder="Ketik jenis baru..." required value={planForm.customType} onChange={e => setPlanForm({...planForm, customType: e.target.value})} className="mt-2 w-full border-2 border-amber-300 dark:border-amber-600 rounded-lg p-2.5 bg-amber-50 dark:bg-amber-900/20 text-gray-900 dark:text-white outline-none" />}
                  </div>
                  <div className="relative">
                    <label className="block text-xs sm:text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Kategori</label>
                    <div onClick={() => setPlanCatDropdownOpen(!planCatDropdownOpen)} className="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg p-2.5 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white font-medium flex justify-between items-center cursor-pointer select-none"><span className="truncate pr-2">{planForm.category}</span><ChevronDown size={16} className="text-gray-500" /></div>
                    {planCatDropdownOpen && (
                      <><div className="fixed inset-0 z-40" onClick={() => setPlanCatDropdownOpen(false)}></div>
                        <div className="absolute z-50 w-full mt-1 sm:mt-2 bg-white dark:bg-gray-800 border-2 border-gray-800 dark:border-gray-600 rounded-lg shadow-[4px_4px_0_0_#000000] max-h-48 overflow-y-auto">
                          {(categoryMap[planForm.type] || []).map(cat => (
                            <div key={cat} className="flex justify-between items-center p-2.5 sm:p-3 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer font-medium border-b border-gray-100 dark:border-gray-700"><span onClick={() => handlePlanCatSelect(cat)} className="flex-1 text-gray-900 dark:text-white truncate">{cat}</span><div className="p-1 sm:p-1.5 bg-gray-100 dark:bg-gray-700 hover:bg-red-100 dark:hover:bg-red-900/50 rounded-lg ml-2 group" onMouseDown={(e) => deleteCategoryFromMap(e, planForm.type, cat)}><Trash2 size={14} className="text-gray-400 group-hover:text-red-500" /></div></div>
                          ))}
                          <div className="p-2.5 sm:p-3 bg-gray-50 dark:bg-gray-900 hover:bg-gray-200 cursor-pointer text-gray-900 dark:text-white font-bold" onClick={() => handlePlanCatSelect('Lainnya...')}>+ Tambah Lainnya...</div>
                        </div></>
                    )}
                    {planForm.category === 'Lainnya...' && <input type="text" placeholder="Ketik kategori baru..." required value={planForm.customCategory} onChange={e => setPlanForm({...planForm, customCategory: e.target.value})} className="mt-2 w-full border-2 border-amber-300 rounded-lg p-2.5 bg-amber-50 outline-none" />}
                  </div>
                  <div>
                    <label className="block text-xs sm:text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Nominal (Rp)</label>
                    <div className="relative">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><DollarSign size={16} className="text-gray-500" /></div>
                      <input type="text" inputMode="numeric" required value={planForm.amount} onChange={e => { const num = e.target.value.replace(/[^0-9]/g, ''); setPlanForm({...planForm, amount: num ? new Intl.NumberFormat('id-ID').format(num) : ''}); }} placeholder="0" className="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg pl-9 sm:pl-10 p-2.5 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white font-black outline-none focus:border-gray-900 dark:focus:border-white transition-colors" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs sm:text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Keterangan Tambahan</label>
                    <input type="text" value={planForm.description} onChange={e => setPlanForm({...planForm, description: e.target.value})} placeholder="Cth: Anggaran Belanja..." className="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg p-2.5 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white font-medium outline-none" />
                  </div>
                  <button type="submit" className="w-full bg-amber-500 hover:bg-amber-600 text-white py-3 rounded-xl font-black mt-4 shadow-[2px_2px_0_0_#78350f] active:shadow-none active:translate-y-[2px] transition-all">Simpan ke Rencana</button>
                </form>
              </div>

              <div className={`lg:col-span-8 bg-white dark:bg-gray-800 rounded-2xl flex flex-col lg:h-[680px] overflow-hidden ${box3D}`}>
                <div className="p-6 border-b-2 border-gray-200 dark:border-gray-700 shrink-0">
                   <h3 className="font-black text-xl text-gray-900 dark:text-white">Daftar Rencana {planForm.month}</h3>
                   <p className="text-sm font-bold text-amber-600 dark:text-amber-400 mt-1">Total Dianggarkan: {renderAmount(totalPlannedAmount)}</p>
                </div>
                <div className="flex-1 overflow-x-auto overflow-y-auto bg-gray-50 dark:bg-gray-900/50 p-4 sm:p-6">
                   <div className="space-y-4 min-w-[500px]">
                     {currentMonthPlans.map(p => (
                       <div key={p.id} className={`flex justify-between items-center p-5 border-2 rounded-xl transition-all ${p.is_completed ? 'opacity-50 bg-gray-100 dark:bg-gray-800 border-gray-200 dark:border-gray-700 grayscale' : 'bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-600 shadow-sm hover:shadow-md'}`}>
                          <div className="flex items-start gap-4">
                            <div className="mt-1">{p.is_completed ? <CheckCircle2 size={24} className="text-green-500" /> : <Clock size={24} className="text-amber-500" />}</div>
                            <div>
                              <p className="font-black text-lg text-gray-900 dark:text-white">{p.category} <span className="text-gray-400 font-medium text-sm mx-1">({p.type})</span></p>
                              <p className="text-sm font-medium text-gray-500 dark:text-gray-400 mt-0.5">{p.description}</p>
                            </div>
                          </div>
                          <div className="flex items-center gap-6">
                            <span className="font-black text-lg tracking-tight text-gray-800 dark:text-gray-200">{renderAmount(p.amount)}</span>
                            <div className="flex gap-2">
                              {!p.is_completed && (
                                <button onClick={() => executePlan(p)} className="flex items-center gap-1 bg-green-100 text-green-700 hover:bg-green-200 dark:bg-green-900/50 dark:text-green-300 px-3 py-2 rounded-lg font-bold transition-colors"><CheckCircle2 size={16}/> Eksekusi</button>
                              )}
                              <button onClick={() => deletePlan(p.id)} className="text-gray-400 hover:text-white hover:bg-red-500 p-2 rounded-lg transition-colors"><Trash2 size={18}/></button>
                            </div>
                          </div>
                       </div>
                     ))}
                     {currentMonthPlans.length === 0 && <div className="text-center py-16"><ClipboardList size={48} className="mx-auto mb-4 text-gray-300 dark:text-gray-600" /><p className="font-bold text-gray-500 dark:text-gray-400">Belum ada rencana bulan ini.</p></div>}
                   </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className={`min-h-screen ${darkMode ? 'dark bg-gray-900' : 'bg-gray-50'} transition-colors duration-300 p-3 sm:p-4 md:p-8 font-sans`}>
          <div className="max-w-7xl mx-auto space-y-5 sm:space-y-8">
            
            {/* HEADER APLIKASI */}
            <div className={`flex flex-col md:flex-row justify-between items-start md:items-center bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-2xl gap-4 ${box3D}`}>
              <div className="w-full flex justify-between items-center md:block">
                <div>
                  <h1 className="text-xl sm:text-2xl md:text-3xl font-black text-gray-900 dark:text-white tracking-tight flex items-center gap-2 sm:gap-3">
                    <ShieldCheck className="text-indigo-600 dark:text-indigo-400" /> Dashboard Keuangan
                  </h1>
                  <p className="text-gray-600 dark:text-gray-400 font-bold mt-1.5 text-xs sm:text-sm flex items-center gap-2">
                    <span className="truncate max-w-[150px] sm:max-w-none">{user?.email}</span> 
                    <span className="bg-indigo-100 text-indigo-700 dark:bg-indigo-900/50 dark:text-indigo-300 px-2 py-0.5 rounded text-[10px] sm:text-xs">PRO Member</span>
                  </p>
                </div>
                <div className="flex gap-1 sm:gap-2 mt-3 md:mt-0">
                  <button onClick={() => setShowTutorial(true)} className="p-2 sm:p-2.5 rounded-full bg-indigo-50 hover:bg-indigo-100 dark:bg-indigo-900/20 dark:hover:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 transition-colors" title="Panduan Penggunaan">
                    <HelpCircle size={20}/>
                  </button>
                  <button onClick={() => setShowBalance(!showBalance)} className="p-2 sm:p-2.5 rounded-full bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-600 dark:text-gray-300 transition-colors" title="Sembunyikan Saldo">
                    {showBalance ? <Eye size={20}/> : <EyeOff size={20}/>}
                  </button>
                  <button onClick={() => setDarkMode(!darkMode)} className="p-2 sm:p-2.5 rounded-full bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-600 dark:text-gray-300 transition-colors">
                    {darkMode ? <Sun size={20}/> : <Moon size={20}/>}
                  </button>
                  <button onClick={() => setModalState({ isOpen: true, type: 'confirm', title: 'Logout', message: 'Yakin ingin keluar dari akun?', onConfirm: onLogout })} className="p-2 sm:p-2.5 rounded-full bg-red-50 hover:bg-red-100 dark:bg-red-900/20 dark:hover:bg-red-900/40 text-red-500 transition-colors">
                    <LogOut size={20}/>
                  </button>
                </div>
              </div>

              {currentView === 'dashboard' && (
                <div className="flex flex-col sm:flex-row w-full md:w-auto items-stretch sm:items-center gap-2 sm:gap-3 bg-gray-100 dark:bg-gray-900 p-2 sm:p-2.5 rounded-xl border-2 border-gray-200 dark:border-gray-700 mt-2 md:mt-0">
                  <span className="text-xs sm:text-sm font-bold text-gray-700 dark:text-gray-300 pl-1 sm:pl-2">Filter Data:</span>
                  <div className="flex gap-2 w-full sm:w-auto">
                    <select 
                      value={globalFilterType} onChange={(e) => setGlobalFilterType(e.target.value)}
                      className="bg-white dark:bg-gray-800 font-bold text-gray-800 dark:text-gray-200 border-2 border-gray-300 dark:border-gray-600 rounded-lg px-2 sm:px-3 py-2 sm:py-1.5 text-xs sm:text-sm outline-none focus:border-indigo-500 w-full sm:w-auto flex-1 cursor-pointer"
                    >
                      <option value="month">Bulanan</option><option value="date">Harian</option><option value="all">Semua Waktu</option>
                    </select>
                    {globalFilterType === 'month' && <input type="month" value={globalFilterValue} onChange={(e) => setGlobalFilterValue(e.target.value)} className="bg-white dark:bg-gray-800 font-bold text-gray-800 dark:text-gray-200 border-2 border-gray-300 dark:border-gray-600 rounded-lg px-2 sm:px-3 py-2 sm:py-1.5 text-xs sm:text-sm outline-none w-full sm:w-auto flex-1 cursor-pointer" />}
                    {globalFilterType === 'date' && <input type="date" value={globalFilterValue} onChange={(e) => setGlobalFilterValue(e.target.value)} className="bg-white dark:bg-gray-800 font-bold text-gray-800 dark:text-gray-200 border-2 border-gray-300 dark:border-gray-600 rounded-lg px-2 sm:px-3 py-2 sm:py-1.5 text-xs sm:text-sm outline-none w-full sm:w-auto flex-1 cursor-pointer" />}
                  </div>
                </div>
              )}
            </div>

            {/* --- NAVIGASI VIEW DINAMIS --- */}
            {currentView === 'savings' && renderSavingsView()}
            {currentView === 'wallets' && renderWalletsView()}
            {currentView === 'history' && renderHistoryView()}
            {currentView === 'planner' && renderPlannerView()}

            {currentView === 'dashboard' && (
              <>
                {/* KARTU DASHBOARD UTAMA */}
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 sm:gap-6">
                  <div onClick={() => setCurrentView('wallets')} className={`bg-gradient-to-br from-blue-50 to-blue-100 dark:from-blue-900/60 dark:to-blue-800/60 p-4 sm:p-6 rounded-2xl flex flex-col justify-center cursor-pointer group ${box3D} ${box3DHover}`}>
                    <Wallet className="mb-3 text-blue-600 dark:text-blue-400 group-hover:scale-110 transition-transform" size={28} />
                    <p className="text-xs sm:text-sm font-bold text-blue-800 dark:text-blue-300 mb-1">Saldo Dompet (All)</p>
                    <h3 className="text-xl sm:text-2xl font-black text-blue-900 dark:text-blue-100 tracking-tight truncate">{formatRupiah(stats.saldoSaatIni)}</h3>
                  </div>
                  
                  <div onClick={() => { setHistoryType('pemasukan'); setCurrentView('history'); }} className={`bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-2xl flex flex-col justify-center cursor-pointer group ${box3D} ${box3DHover}`}>
                    <TrendingUp className="mb-3 text-green-600 dark:text-green-400 group-hover:scale-110 transition-transform" size={28} />
                    <p className="text-xs sm:text-sm font-bold text-gray-500 dark:text-gray-400 mb-1">Pemasukan (Filter)</p>
                    <h3 className="text-xl sm:text-2xl font-black text-gray-900 dark:text-white tracking-tight truncate">{formatRupiah(stats.pemasukanFilter)}</h3>
                  </div>
                  
                  <div onClick={() => { setHistoryType('pengeluaran'); setCurrentView('history'); }} className={`bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-2xl flex flex-col justify-center cursor-pointer group ${box3D} ${box3DHover}`}>
                    <TrendingDown className="mb-3 text-red-600 dark:text-red-400 group-hover:scale-110 transition-transform" size={28} />
                    <p className="text-xs sm:text-sm font-bold text-gray-500 dark:text-gray-400 mb-1">Pengeluaran (Filter)</p>
                    <h3 className="text-xl sm:text-2xl font-black text-gray-900 dark:text-white tracking-tight truncate">{formatRupiah(stats.pengeluaranFilter)}</h3>
                  </div>
                  
                  <div onClick={() => setCurrentView('savings')} className={`bg-gradient-to-br from-purple-50 to-purple-100 dark:from-purple-900/60 dark:to-purple-800/60 p-4 sm:p-6 rounded-2xl flex flex-col justify-center cursor-pointer group ${box3D} ${box3DHover}`}>
                    <PiggyBank className="mb-3 text-purple-600 dark:text-purple-400 group-hover:scale-110 transition-transform" size={28} />
                    <p className="text-xs sm:text-sm font-bold text-purple-800 dark:text-purple-300 mb-1">Total Tabungan (All)</p>
                    <h3 className="text-xl sm:text-2xl font-black text-purple-900 dark:text-purple-100 tracking-tight truncate">{formatRupiah(stats.totalTabungan)}</h3>
                  </div>
                  
                  <div onClick={() => setCurrentView('planner')} className={`bg-gradient-to-br from-amber-50 to-amber-100 dark:from-amber-900/60 dark:to-amber-800/60 p-4 sm:p-6 rounded-2xl flex flex-col justify-center cursor-pointer group ${box3D} ${box3DHover}`}>
                    <ClipboardList className="mb-3 text-amber-600 dark:text-amber-400 group-hover:scale-110 transition-transform" size={28} />
                    <p className="text-xs sm:text-sm font-bold text-amber-800 dark:text-amber-300 mb-1">Rencana Bulanan</p>
                    <h3 className="text-xl sm:text-2xl font-black text-amber-900 dark:text-amber-100 tracking-tight truncate">{plans.filter(p => !p.is_completed).length} Tugas Aktif</h3>
                  </div>
                </div>

                {/* FORM & TABEL DASHBOARD UTAMA */}
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-5 sm:gap-6 items-stretch lg:h-[680px]">
                  
                  {/* Kolom Kiri: Form Catat Transaksi */}
                  <div className={`lg:col-span-4 bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-2xl flex flex-col ${box3D}`}>
                    <h2 className="text-lg sm:text-xl font-black text-gray-900 dark:text-white mb-5 flex items-center gap-2 shrink-0">
                      <PlusCircle size={22} className="text-indigo-600 dark:text-indigo-400" /> Catat Transaksi
                    </h2>
                    
                    <div className="flex-1 lg:overflow-y-auto lg:pr-2 pb-1">
                      <form onSubmit={handleSubmitTransaction} className="space-y-4">
                        <div>
                          <label className="block text-xs sm:text-sm font-bold mb-1.5 text-gray-700 dark:text-gray-300">Tanggal</label>
                          <input type="date" required value={formData.date} onChange={handleInputChange} name="date" className="w-full border-2 border-gray-300 dark:border-gray-600 p-2.5 rounded-lg font-medium text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:border-indigo-500 transition-colors cursor-pointer" />
                        </div>
                        
                        <div>
                          <label className="block text-xs sm:text-sm font-bold mb-1.5 text-gray-700 dark:text-gray-300">Jenis Transaksi</label>
                          <select name="type" value={formData.type} onChange={handleInputChange} className="w-full border-2 border-gray-300 dark:border-gray-600 p-2.5 rounded-lg font-bold text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:border-indigo-500 transition-colors cursor-pointer">
                            {Object.keys(categoryMap).map(k => <option key={k} value={k}>{k}</option>)}
                            <option value="Lainnya...">+ Buat Tipe Baru...</option>
                          </select>
                          {formData.type === 'Lainnya...' && (
                            <input type="text" name="customType" placeholder="Ketik jenis transaksi baru..." required value={formData.customType} onChange={handleInputChange} className="mt-2 w-full border-2 border-indigo-300 p-2.5 rounded-lg bg-indigo-50 dark:bg-indigo-900/30 dark:border-indigo-600 dark:text-white font-medium outline-none focus:border-indigo-500 transition-colors" />
                          )}
                        </div>
                        
                        <div className="relative">
                          <label className="block text-xs sm:text-sm font-bold mb-1.5 text-gray-700 dark:text-gray-300">Kategori</label>
                          <div onClick={() => setCatDropdownOpen(!catDropdownOpen)} className="w-full border-2 border-gray-300 dark:border-gray-600 p-2.5 rounded-lg flex justify-between items-center cursor-pointer font-bold text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:border-indigo-500 transition-colors select-none">
                            <span className="truncate pr-2">{formData.category}</span><ChevronDown size={18} className="text-gray-500"/>
                          </div>
                          
                          {catDropdownOpen && (
                            <>
                              <div className="fixed inset-0 z-40" onClick={() => setCatDropdownOpen(false)}></div>
                              <div className="absolute z-50 w-full mt-2 bg-white dark:bg-gray-800 border-2 border-gray-900 dark:border-gray-600 shadow-[4px_4px_0_0_#000] dark:shadow-[4px_4px_0_0_#000] rounded-xl max-h-48 overflow-y-auto">
                                {(categoryMap[formData.type] || []).map(cat => (
                                  <div key={cat} className="p-3 hover:bg-gray-100 dark:hover:bg-gray-700 flex justify-between items-center cursor-pointer border-b border-gray-100 dark:border-gray-700 transition-colors">
                                    <span onClick={() => { setFormData({...formData, category: cat}); setCatDropdownOpen(false); }} className="flex-1 font-bold text-gray-900 dark:text-white truncate pr-2">{cat}</span>
                                    <div onMouseDown={(e) => deleteCategoryFromMap(e, formData.type, cat)} className="p-1.5 bg-gray-200 dark:bg-gray-600 hover:bg-red-100 dark:hover:bg-red-900/50 rounded-lg group transition-colors">
                                      <Trash2 size={16} className="text-gray-500 group-hover:text-red-500" />
                                    </div>
                                  </div>
                                ))}
                                <div onClick={() => handleCatSelect('Lainnya...')} className="p-3 font-black text-indigo-600 dark:text-indigo-400 bg-gray-50 dark:bg-gray-900 hover:bg-gray-200 dark:hover:bg-gray-700 cursor-pointer transition-colors">
                                  + Tambah Kategori Baru...
                                </div>
                              </div>
                            </>
                          )}
                          
                          {formData.category === 'Lainnya...' && (
                            <input type="text" name="customCategory" placeholder="Ketik kategori baru..." required value={formData.customCategory} onChange={handleInputChange} className="mt-2 w-full border-2 border-indigo-300 p-2.5 rounded-lg bg-indigo-50 dark:bg-indigo-900/30 dark:border-indigo-600 dark:text-white font-medium outline-none focus:border-indigo-500 transition-colors" />
                          )}
                        </div>
                        
                        <div>
                          <label className="block text-xs sm:text-sm font-bold mb-1.5 text-gray-700 dark:text-gray-300">Nominal (Rp)</label>
                          <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><DollarSign size={18} className="text-gray-500" /></div>

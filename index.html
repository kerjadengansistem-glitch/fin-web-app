                            <input type="text" inputMode="numeric" required value={formData.amount} onChange={handleInputChange} name="amount" placeholder="0" className="w-full border-2 border-gray-300 dark:border-gray-600 pl-10 p-2.5 rounded-lg font-black text-lg text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:border-indigo-500 transition-colors tracking-tight" />
                          </div>
                        </div>
                        
                        <div>
                          <label className="block text-xs sm:text-sm font-bold mb-1.5 text-gray-700 dark:text-gray-300">Keterangan Tambahan</label>
                          <input type="text" value={formData.description} onChange={handleInputChange} name="description" placeholder="Opsional, cth: Makan siang..." className="w-full border-2 border-gray-300 dark:border-gray-600 p-2.5 rounded-lg font-medium text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:border-indigo-500 transition-colors" />
                        </div>
                        
                        <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black text-lg py-3.5 rounded-xl border-2 border-indigo-900 shadow-[2px_2px_0_0_#312e81] active:shadow-none active:translate-y-[2px] transition-all mt-6">
                          Simpan Transaksi
                        </button>
                      </form>
                    </div>
                  </div>

                  {/* Kolom Kanan: Tabel Riwayat Utama */}
                  <div className={`lg:col-span-8 bg-white dark:bg-gray-800 rounded-2xl flex flex-col h-[500px] lg:h-full overflow-hidden ${box3D}`}>
                    <div className="p-4 sm:p-6 border-b-2 border-gray-200 dark:border-gray-700 shrink-0 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 sm:gap-0">
                      <h2 className="text-lg sm:text-xl font-black text-gray-900 dark:text-white flex items-center gap-2">
                        <Clock className="text-indigo-500" /> Riwayat Transaksi Terbaru
                      </h2>
                      <div className="flex gap-2 w-full sm:w-auto">
                        {isSelectMode ? (
                           <button onClick={deleteSelectedTransactions} disabled={selectedIds.size === 0} className="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-bold border-2 border-red-900 disabled:opacity-50 transition-all shadow-[2px_2px_0_0_#7f1d1d] active:shadow-none active:translate-y-[2px]">
                             <Trash2 size={16} /> Hapus ({selectedIds.size})
                           </button>
                        ) : (
                          <button onClick={() => setIsSelectMode(true)} className="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-indigo-100 text-indigo-700 hover:bg-indigo-200 dark:bg-indigo-900/50 dark:text-indigo-300 dark:hover:bg-indigo-800 px-4 py-2 rounded-lg text-sm font-bold border-2 border-indigo-200 dark:border-indigo-700 transition-all">
                            Pilih Multi Baris
                          </button>
                        )}
                      </div>
                    </div>
                    
                    <div className="flex-1 overflow-auto bg-gray-50 dark:bg-gray-900/50 relative">
                      <table className="w-full text-left border-collapse min-w-[800px]">
                        <thead className="bg-white dark:bg-gray-800 sticky top-0 z-10 shadow-sm border-b-2 border-gray-200 dark:border-gray-700">
                          <tr className="text-xs sm:text-sm font-bold text-gray-700 dark:text-gray-300">
                            {isSelectMode && <th className="p-3 w-12 text-center border-r border-gray-100 dark:border-gray-700">✓</th>}
                            <th className="p-3 whitespace-nowrap">Tanggal</th>
                            <th className="p-3">Tipe</th>
                            <th className="p-3">Kategori</th>
                            <th className="p-3">Keterangan</th>
                            <th className="p-3 text-right">Nominal</th>
                            <th className="p-3 text-center">Aksi</th>
                          </tr>
                          
                          {/* Baris Input Filter Kolom */}
                          <tr className="bg-gray-100 dark:bg-gray-700/50 border-b-2 border-gray-200 dark:border-gray-700">
                            {isSelectMode && <th className="p-1.5 border-r border-gray-200 dark:border-gray-600"></th>}
                            <th className="p-1.5 px-2">
                              <input type="date" value={tableFilters.date} onChange={e => setTableFilters({...tableFilters, date: e.target.value})} className="w-full min-w-[110px] p-2 border-2 border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-800 dark:text-white text-xs font-bold outline-none focus:border-indigo-500" />
                            </th>
                            <th className="p-1.5 px-2">
                              <select value={tableFilters.type} onChange={e => setTableFilters({...tableFilters, type: e.target.value})} className="w-full min-w-[120px] p-2 border-2 border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-800 dark:text-white text-xs font-bold outline-none focus:border-indigo-500 cursor-pointer">
                                <option value="">Semua Tipe</option>{uniqueTypes.map(t => <option key={t} value={t}>{t}</option>)}
                              </select>
                            </th>
                            <th className="p-1.5 px-2">
                              <select value={tableFilters.category} onChange={e => setTableFilters({...tableFilters, category: e.target.value})} className="w-full min-w-[120px] p-2 border-2 border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-800 dark:text-white text-xs font-bold outline-none focus:border-indigo-500 cursor-pointer">
                                <option value="">Semua Kategori</option>{uniqueCats.map(c => <option key={c} value={c}>{c}</option>)}
                              </select>
                            </th>
                            <th className="p-1.5 px-2">
                              <input type="text" placeholder="Cari ket..." value={tableFilters.desc} onChange={e => setTableFilters({...tableFilters, desc: e.target.value})} className="w-full min-w-[120px] p-2 border-2 border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-800 dark:text-white text-xs font-bold outline-none focus:border-indigo-500" />
                            </th>
                            <th className="p-1.5 px-2"></th>
                            <th className="p-1.5 px-2 text-center">
                              <button onClick={() => { setIsSelectMode(!isSelectMode); setSelectedIds(new Set()); }} className={`text-[11px] sm:text-xs font-black px-2 py-2 rounded-lg w-full transition-colors border-2 ${isSelectMode ? 'bg-red-100 text-red-700 border-red-200 dark:bg-red-900/50 dark:text-red-300 dark:border-red-800 hover:bg-red-200' : 'bg-gray-200 text-gray-700 border-gray-300 dark:bg-gray-600 dark:text-gray-300 dark:border-gray-500 hover:bg-gray-300'}`}>
                                {isSelectMode ? 'Batal' : 'Pilih Baris'}
                              </button>
                            </th>
                          </tr>
                        </thead>
                        
                        <tbody className="text-xs sm:text-sm text-gray-900 dark:text-white">
                          {filteredForTable.map(t => {
                            const isInc = t.type.toLowerCase().includes('pemasukan');
                            const isSav = t.type.toLowerCase().includes('tabungan');
                            return (
                              <tr key={t.id} className="border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                                {isSelectMode && (
                                  <td className="p-3 text-center border-r border-gray-100 dark:border-gray-700">
                                    <input type="checkbox" checked={selectedIds.has(t.id)} onChange={() => toggleSelectTransaction(t.id)} className="w-4 h-4 rounded cursor-pointer accent-indigo-600" />
                                  </td>
                                )}
                                <td className="p-4 whitespace-nowrap font-bold text-gray-600 dark:text-gray-400">{t.date}</td>
                                <td className="p-4">
                                  <span className={`px-2.5 py-1 rounded-md text-[10px] sm:text-xs font-black inline-block border whitespace-nowrap ${isInc ? 'bg-green-50 text-green-700 border-green-200 dark:bg-green-900/30 dark:text-green-400 dark:border-green-800' : isSav ? 'bg-purple-50 text-purple-700 border-purple-200 dark:bg-purple-900/30 dark:text-purple-400 dark:border-purple-800' : 'bg-red-50 text-red-700 border-red-200 dark:bg-red-900/30 dark:text-red-400 dark:border-red-800'}`}>
                                    {t.type.toUpperCase()}
                                  </span>
                                </td>
                                <td className="p-4 font-black truncate max-w-[150px]">{t.category}</td>
                                <td className="p-4 font-medium text-gray-600 dark:text-gray-400 truncate max-w-[180px]">{t.description}</td>
                                <td className={`p-4 text-right font-black tracking-tight text-sm sm:text-base whitespace-nowrap ${isInc ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'}`}>
                                  {isInc ? '+' : '-'}{formatRupiah(t.amount)}
                                </td>
                                <td className="p-4 text-center">
                                  <button onClick={() => deleteTransactionItem(t.id)} className="text-gray-400 hover:text-white hover:bg-red-500 p-2 rounded-lg transition-colors" title="Hapus Permanen">
                                    <Trash2 size={18} />
                                  </button>
                                </td>
                              </tr>
                            );
                          })}
                          {filteredForTable.length === 0 && (
                            <tr>
                              <td colSpan={isSelectMode ? "7" : "6"} className="text-center py-20 text-gray-500 dark:text-gray-400 font-bold bg-white dark:bg-gray-800">
                                <Clock size={48} className="mx-auto mb-4 opacity-20" />
                                Tidak ada transaksi ditemukan.
                              </td>
                            </tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </>
            )}

            {/* --- MODAL GLOBAL KUSTOM 3D --- */}
            {modalState.isOpen && (
              <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm animate-fadeIn">
                <div className={`bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-3xl w-full max-w-sm md:max-w-md ${box3D}`}>
                  <h3 className="text-xl sm:text-2xl font-black text-gray-900 dark:text-white mb-2">{modalState.title}</h3>
                  <p className="text-sm sm:text-base text-gray-600 dark:text-gray-300 mb-6 font-medium leading-relaxed">{modalState.message}</p>
                  
                  {modalState.type === 'prompt' && (
                    <input 
                      type={modalState.inputType} 
                      autoFocus 
                      value={modalState.inputValue} 
                      onChange={e => {
                        let val = e.target.value;
                        if (modalState.isCurrency) {
                          const isNegative = val.startsWith('-');
                          const num = val.replace(/[^0-9]/g, '');
                          val = num ? (isNegative ? '-' : '') + new Intl.NumberFormat('id-ID').format(num) : (isNegative ? '-' : '');
                        }
                        setModalState(prev => ({...prev, inputValue: val}));
                      }} 
                      onKeyDown={e => { if(e.key === 'Enter') { if(modalState.onConfirm) modalState.onConfirm(modalState.inputValue); closeModal(); } }}
                      className="w-full border-2 border-gray-900 dark:border-gray-500 p-3 rounded-xl mb-6 dark:bg-gray-700 dark:text-white font-black text-lg outline-none focus:border-indigo-600 dark:focus:border-indigo-400 transition-colors shadow-[2px_2px_0_0_#000] dark:shadow-[2px_2px_0_0_#000] focus:shadow-none focus:translate-y-[2px]" 
                    />
                  )}

                  <div className="flex flex-col-reverse sm:flex-row justify-end gap-3 sm:gap-4 mt-2">
                    {modalState.type !== 'alert' && (
                      <button onClick={closeModal} className="w-full sm:w-auto px-5 py-3 sm:py-2.5 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-900 dark:text-white font-black rounded-xl transition-colors text-sm sm:text-base border-2 border-transparent">
                        Batal
                      </button>
                    )}
                    <button onClick={() => { if(modalState.onConfirm) modalState.onConfirm(modalState.inputValue); closeModal(); }} className={`w-full sm:w-auto px-6 py-3 sm:py-2.5 text-white font-black rounded-xl transition-all border-2 active:shadow-none active:translate-y-[2px] text-sm sm:text-base ${modalState.type === 'confirm' ? 'bg-red-600 hover:bg-red-700 border-red-900 shadow-[2px_2px_0_0_#7f1d1d]' : 'bg-indigo-600 hover:bg-indigo-700 border-indigo-900 shadow-[2px_2px_0_0_#312e81]'}`}>
                      {modalState.type === 'alert' ? 'Mengerti' : (modalState.type === 'confirm' ? 'Ya, Eksekusi' : 'Konfirmasi')}
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* --- TUTORIAL MODAL --- */}
            {showTutorial && (
              <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 sm:p-6 bg-black/60 backdrop-blur-sm animate-fadeIn">
                <div className={`bg-white dark:bg-gray-800 rounded-2xl w-full max-w-3xl max-h-[90vh] flex flex-col overflow-hidden ${box3D}`}>
                  <div className="p-4 sm:p-6 border-b-2 border-gray-200 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-900/50 shrink-0">
                    <h2 className="text-lg sm:text-xl font-black text-gray-900 dark:text-white flex items-center gap-2">
                      <HelpCircle className="text-indigo-500" /> Buku Panduan KeuanganKu
                    </h2>
                    <button onClick={() => setShowTutorial(false)} className="p-2 bg-gray-200 hover:bg-red-100 dark:bg-gray-700 dark:hover:bg-red-900/50 text-gray-600 hover:text-red-600 dark:text-gray-300 dark:hover:text-red-400 rounded-full transition-colors">
                      <X size={20} />
                    </button>
                  </div>
                  
                  <div className="p-4 sm:p-6 overflow-y-auto space-y-6 text-gray-700 dark:text-gray-300 text-sm sm:text-base">
                    <div className="space-y-2">
                      <h3 className="text-base sm:text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2"><Wallet size={18} className="text-blue-500"/> 1. Saldo Dompet & Rekening</h3>
                      <p>Menu ini berfungsi sebagai buku catatan rekening nyata Anda (seperti Dompet Tunai, BCA, GoPay, dll).</p>
                      <ul className="list-disc pl-5 space-y-1">
                        <li><strong>Tambah Dompet:</strong> Buat kategori dompet baru dengan warna pilihan.</li>
                        <li><strong>Sesuaikan Saldo:</strong> Jika ada ketidakcocokan saldo asli dengan catatan di aplikasi, gunakan tombol ini untuk memperbaikinya secara manual tanpa mempengaruhi riwayat transaksi.</li>
                      </ul>
                    </div>

                    <div className="space-y-2">
                      <h3 className="text-base sm:text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2"><PlusCircle size={18} className="text-indigo-500"/> 2. Catat Transaksi</h3>
                      <p>Ini adalah pusat kendali untuk mencatat arus kas Anda secara rutin.</p>
                      <ul className="list-disc pl-5 space-y-1">
                        <li><strong>Pilih Jenis:</strong> Tentukan apakah ini <em>Pemasukan</em>, <em>Pengeluaran Harian</em>, <em>Biaya Bulanan</em>, atau <em>Tabungan</em>.</li>
                        <li><strong>Kategori Kustom:</strong> Jika kategori yang ada kurang cocok, pilih <strong>"Lainnya..."</strong>. Kategori baru yang diketik akan otomatis tersimpan permanen di database!</li>
                        <li><strong>Hapus Kategori:</strong> Klik ikon tong sampah (🗑️) di dropdown untuk menghapusnya.</li>
                      </ul>
                    </div>

                    <div className="space-y-2">
                      <h3 className="text-base sm:text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2"><Target size={18} className="text-purple-500"/> 3. Target Tabungan</h3>
                      <p>Gunakan menu ini untuk merencanakan impian jangka panjang (misalnya: Beli Laptop Baru, Liburan).</p>
                      <ul className="list-disc pl-5 space-y-1">
                        <li>Tentukan <strong>Target Nominal</strong>, <strong>Tanggal Capai</strong>, dan <strong>Urgensi</strong>.</li>
                        <li>Klik <strong>Update Saldo</strong> untuk menyicil uang ke target tersebut. <em>(Tips: Ketik minus "-" di awal angka untuk menarik/mengurangi saldo).</em></li>
                      </ul>
                    </div>

                    <div className="space-y-2">
                      <h3 className="text-base sm:text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2"><ClipboardList size={18} className="text-amber-500"/> 4. Rencana Bulanan (Budgeting)</h3>
                      <p>Berguna untuk menyusun anggaran pengeluaran rutin masa depan (bayar kos, listrik, internet).</p>
                      <ul className="list-disc pl-5 space-y-1">
                        <li>Data yang dicatat di sini <strong>belum memotong saldo aktual Anda</strong>. Ini murni sebatas "pengingat".</li>
                        <li><strong>Tombol Eksekusi:</strong> Saat Anda benar-benar membayar tagihannya, klik tombol ini! Anda bisa mengedit nominalnya jika tagihan asli berbeda. Setelah dieksekusi, ia otomatis pindah ke riwayat transaksi nyata.</li>
                      </ul>
                    </div>

                    <div className="space-y-2">
                      <h3 className="text-base sm:text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2"><Filter size={18} className="text-gray-500"/> 5. Fitur Tambahan & Privasi</h3>
                      <ul className="list-disc pl-5 space-y-1">
                        <li><strong>Filter Waktu:</strong> Ubah tampilan ringkasan ke mode Harian, Bulanan, atau Semua Waktu di pojok kanan atas Dashboard.</li>
                        <li><strong>Mode Mata (Privasi):</strong> Klik ikon Mata (👁️) di header untuk menyembunyikan nominal uang Anda saat membuka aplikasi di tempat umum.</li>
                        <li><strong>Export CSV:</strong> Masuk ke riwayat transaksi dan klik tombol Export untuk men-download data ke format Excel.</li>
                      </ul>
                    </div>
                  </div>
                  
                  <div className="p-4 sm:p-5 border-t-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50 flex justify-end shrink-0">
                    <button onClick={() => setShowTutorial(false)} className="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-all border-2 border-indigo-900 shadow-[2px_2px_0_0_#312e81] active:shadow-none active:translate-y-[2px]">
                      Tutup Panduan
                    </button>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<AppWrapper />);
  </script>
</body>
</html>
